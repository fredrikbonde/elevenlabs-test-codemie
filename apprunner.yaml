version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install -r requirements.txt
run:
  runtime-version: "3.11"
  pre-run:
    - pip3 install -r requirements.txt
  command: uvicorn main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: CLAUDE_MODEL
      value: "claude-sonnet-4-20250514"
    - name: MAX_TOKENS
      value: "1024"
  secrets:
    - name: ANTHROPIC_API_KEY
    - value-from: "arn:aws:ssm:eu-central-1:745559540611:parameter/elevenlabs-bridge/anthropic-api-key"
