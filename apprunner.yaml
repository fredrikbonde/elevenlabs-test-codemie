version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install -r requirements.txt
run:
  runtime-version: "3.11"
  pre-run:
    - pip3 install -r requirements.txt
  command: uvicorn main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: CODEMIE_ENDPOINT
      value: "https://codemie.lab.epam.com/code-assistant-api/v1/assistants"
    - name: CODEMIE_ASSISTANT_ID
      value: "5d6764cb-ddb9-4b69-8097-e0125b941c51"
    - name: CODEMIE_ASSISTANT_FOLDER
      value: "ElevenLabs"
    - name: CODEMIE_LLM_MODEL
      value: "claude-haiku-4-5-20251001"
    - name: KEYCLOAK_URL
      value: "https://auth.codemie.lab.epam.com/realms/codemie-prod/protocol/openid-connect/token"
    - name: KEYCLOAK_CLIENT
      value: "codemie-sdk"
  secrets:
    - name: CODEMIE_USERNAME
      value-from: "arn:aws:ssm:eu-central-1:745559540611:parameter/elevenlabs-bridge/codemie-username"
    - name: CODEMIE_PASSWORD
      value-from: "arn:aws:ssm:eu-central-1:745559540611:parameter/elevenlabs-bridge/codemie-password"
