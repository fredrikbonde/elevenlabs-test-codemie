version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install -r requirements.txt
run:
  runtime-version: "3.11"
  pre-run:
    - pip3 install -r requirements.txt
  command: uvicorn main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: CLAUDE_MODEL
      value: "claude-haiku-4-5-20251001"
    - name: MAX_TOKENS
      value: "1024"
    - name: CODEMIE_ASSISTANT_ID
      value: "5ad0aa50-13a1-4afe-b08a-16af9380d92c"
    - name: CODEMIE_LLM_MODEL
      value: "claude-haiku-4-5-20251001"
    - name: CODEMIE_ENDPOINT
      value: "https://codemie.lab.epam.com/code-assistant-api/v1/assistants"
  secrets:
    - name: CODEMIE_OAUTH_PROXY_0
      value-from: "arn:aws:ssm:eu-central-1:745559540611:parameter/elevenlabs-bridge/codemie-oauth-proxy-0"
    - name: CODEMIE_OAUTH_PROXY_1
      value-from: "arn:aws:ssm:eu-central-1:745559540611:parameter/elevenlabs-bridge/codemie-oauth-proxy-1"
